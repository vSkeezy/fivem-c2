<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FiveM C2 Control</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #1a1a1a; color: #e0e0e0; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background-color: #2d2d2d; padding: 2.5rem; border-radius: 12px; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5); width: 90%; max-width: 700px; text-align: center; }
        h1 { color: #e74c3c; margin-bottom: 1.5rem; font-size: 1.8rem; }
        .tabs { display: flex; margin-bottom: 1.5rem; border-bottom: 2px solid #444; }
        .tab { flex: 1; padding: 10px; cursor: pointer; border: none; background: none; color: #bdc3c7; font-size: 1rem; }
        .tab.active { color: #e74c3c; border-bottom: 2px solid #e74c3c; }
        .tab-content { display: none; text-align: left; }
        .tab-content.active { display: block; }
        .input-group { margin-bottom: 1.5rem; }
        label { display: block; margin-bottom: 0.5rem; font-size: 0.9rem; color: #bdc3c7; }
        input[type="text"], input[type="password"], textarea { width: 100%; padding: 12px; border: 1px solid #555; border-radius: 6px; background-color: #444; color: #fff; box-sizing: border-box; font-size: 1rem; }
        button { width: 100%; padding: 12px; border: none; border-radius: 6px; background-color: #c0392b; color: white; font-size: 1rem; font-weight: bold; cursor: pointer; transition: background-color 0.3s ease; margin-bottom: 10px; }
        button:hover { background-color: #a93226; }
        #status { margin-top: 1.5rem; font-size: 0.9rem; min-height: 20px; text-align: center; }
        .success { color: #2ecc71; }
        .error { color: #e74c3c; }
        #playerList { list-style: none; padding: 0; max-height: 400px; overflow-y: auto; }
        #playerList li { background: #444; padding: 12px; border-radius: 6px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
        #playerList li .player-info { font-weight: bold; }
        #playerList li .player-id { color: #95a5a6; font-size: 0.8em; }
        #playerList li .player-actions { display: flex; gap: 5px; }
        .small-btn { padding: 5px 10px; font-size: 0.8em; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔐 FiveM C2 Control</h1>
        <div class="tabs">
            <button class="tab active" onclick="showTab('players')">Spieler</button>
            <button class="tab" onclick="showTab('command')">Befehl</button>
            <button class="tab" onclick="showTab('chat')">Chat</button>
        </div>

        <!-- Tab 1: Spieler -->
        <div id="players" class="tab-content active">
            <div id="playerListContainer">
                <ul id="playerList">Lade Spieler...</ul>
            </div>
        </div>

        <!-- Tab 2: Befehl -->
        <div id="command" class="tab-content">
            <div class="input-group">
                <label for="tokenInput">GitHub Token</label>
                <input type="password" id="tokenInput" placeholder="Dein Personal Access Token">
            </div>
            <div class="input-group">
                <label for="commandInput">Server-Befehl</label>
                <input type="text" id="commandInput" placeholder="z.B. add_principal identifier.steam:xxx group.admin">
            </div>
            <button onclick="sendCommand()">Befehl senden</button>
        </div>

        <!-- Tab 3: Chat -->
        <div id="chat" class="tab-content">
            <div class="input-group">
                <label for="chatMessageInput">Chat-Nachricht</label>
                <textarea id="chatMessageInput" placeholder="Nachricht, die an alle Spieler gesendet wird."></textarea>
            </div>
            <button onclick="sendChatMessage()">Nachricht senden</button>
        </div>

        <div id="status">Bereit.</div>
    </div>

    <script>
        // --- KONFIGURATION ---
        const GITHUB_USERNAME = "vSkeezy";
        const REPO_NAME = "fivem-c2";
        const COMMANDS_FILE_PATH = "commands.json";
        const PLAYERS_FILE_PATH = "players.json";

        const API_URL = `https://api.github.com/repos/${GITHUB_USERNAME}/${REPO_NAME}/contents/`;

        // Tab-Wechsel Logik
        function showTab(tabName) {
            document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
            document.querySelector(`button[onclick="showTab('${tabName}')"]`).classList.add('active');
            document.getElementById(tabName).classList.add('active');
        }

        // Funktion zum Senden von Aktionen
        async function sendAction(action) {
            const token = document.getElementById('tokenInput').value;
            const statusDiv = document.getElementById('status');

            if (!token) {
                statusDiv.textContent = '❌ Token ist erforderlich.';
                statusDiv.className = 'error';
                return;
            }

            statusDiv.textContent = 'Sende...';
            statusDiv.className = '';

            try {
                const getFileResponse = await fetch(API_URL + COMMANDS_FILE_PATH, { headers: { 'Authorization': `token ${token}` } });
                let fileData = { sha: '' };
                if (getFileResponse.ok) {
                    fileData = await getFileResponse.json();
                }

                const commands = { action: action };

                const content = btoa(unescape(encodeURIComponent(JSON.stringify(commands))));
                const body = JSON.stringify({
                    message: `Update command`,
                    content: content,
                    sha: fileData.sha
                });

                const updateResponse = await fetch(API_URL + COMMANDS_FILE_PATH, {
                    method: 'PUT',
                    headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
                    body: body
                });

                if (updateResponse.ok) {
                    statusDiv.textContent = '✅ Aktion gesendet!';
                    statusDiv.className = 'success';
                } else {
                    throw new Error('Fehler beim Senden.');
                }

            } catch (error) {
                statusDiv.textContent = `❌ ${error.message}`;
                statusDiv.className = 'error';
            }
        }

        function sendCommand() {
            const command = document.getElementById('commandInput').value;
            sendAction(command);
            document.getElementById('commandInput').value = '';
        }

        function sendChatMessage() {
            const message = document.getElementById('chatMessageInput').value;
            sendAction(`say ^1^[SERVER] ${message}`);
            document.getElementById('chatMessageInput').value = '';
        }

        // Spielerliste laden
        async function loadPlayerList() {
            try {
                const response = await fetch(`https://raw.githubusercontent.com/${GITHUB_USERNAME}/${REPO_NAME}/main/${PLAYERS_FILE_PATH}`);
                if (!response.ok) return;

                const players = await response.json();
                const playerListUl = document.getElementById('playerList');
                playerListUl.innerHTML = ''; // Leere die Liste

                if (players.length === 0) {
                    playerListUl.innerHTML = '<li>Keine Spieler online.</li>';
                    return;
                }

                players.forEach(player => {
                    const li = document.createElement('li');
                    li.innerHTML = `
                        <div class="player-info">
                            ${player.name}
                            <span class="player-id">ID: ${player.id}</span>
                        </div>
                        <div class="player-actions">
                            <button class="small-btn" onclick="sendAction('kick ${player.id}')">Kick</button>
                            <button class="small-btn" onclick="sendAction('slap ${player.id} 10')">Slap</button>
                        </div>
                    `;
                    playerListUl.appendChild(li);
                });

            } catch (error) {
                console.error("Fehler beim Laden der Spielerliste:", error);
                document.getElementById('playerList').innerHTML = '<li>Konnte Spielerliste nicht laden.</li>';
            }
        }

        // Lade die Spielerliste alle 10 Sekunden neu
        setInterval(loadPlayerList, 10000);
        // Und lade sie sofort beim Start
        loadPlayerList();
    </script>
</body>
</html>
